<div class="filter-section">
  <h2 class="section-label">Sortierung</h2>

  <mat-form-field subscriptSizing="dynamic" class="sort-field">
    <mat-label>Sortieren nach</mat-label>
    <mat-select [value]="store.sortColumn()" (valueChange)="onSortFieldChange($event)">
      <mat-option value="">– keine –</mat-option>
      @for (f of sortFields; track f.value) {
        <mat-option [value]="f.value">{{ f.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (store.sortColumn()) {
    <mat-button-toggle-group
      [value]="store.sortDirection()"
      (change)="store.setSortDirection($event.value)"
      class="direction-toggle">
      <mat-button-toggle value="asc">
        <mat-icon>arrow_upward</mat-icon>
        Aufsteigend
      </mat-button-toggle>
      <mat-button-toggle value="desc">
        <mat-icon>arrow_downward</mat-icon>
        Absteigend
      </mat-button-toggle>
    </mat-button-toggle-group>
  }
</div>
