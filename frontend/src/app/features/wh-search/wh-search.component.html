<app-zone-left>
  <app-wh-filter
    [loading]="searchMode() && loading()"
    [error]="searchMode() ? error() : null"
    (search)="onSearch($event)"
  />
</app-zone-left>

<app-zone-right>
  <app-wh-sort [(sortColumn)]="sortColumn" [(sortDirection)]="sortDirection" />
  <app-wh-listings
    [listings]="sortedListings()"
    [loading]="loading()"
    [error]="error()"
    [searchMode]="searchMode()"
    [count]="count()"
    [whTotal]="whTotal()"
    [(filterText)]="filterText"
    [(freeOnly)]="freeOnly"
    (delete)="deleteListing($event)"
    (showAll)="showAllListings()"
  />
</app-zone-right>
