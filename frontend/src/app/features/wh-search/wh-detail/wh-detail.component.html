@if (detail(); as d) {
  <div class="detail-panel" [@detailSlide]>
    <div class="detail-header">
      <h2 class="detail-title">{{ d.title }}</h2>
    </div>

    <div class="detail-content">
      <app-wh-base [detail]="d" />
      <mat-divider />
      <app-item-annotation [detail]="d" />
      <mat-divider />
      <app-item-research [detail]="d" />
    </div>
  </div>
} @else {
  <div class="detail-empty">
    <mat-icon>info</mat-icon>
    <p>Kein Inserat ausgewählt.</p>
  </div>
}
