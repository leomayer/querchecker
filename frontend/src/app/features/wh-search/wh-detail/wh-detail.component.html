@if (detail(); as listing) {
  <div class="detail-panel" [@detailSlide]>
    <div class="detail-header">
      <h2 class="detail-title">{{ listing.title }}</h2>
    </div>

    <div class="detail-content" [class.dragging]="dragging !== null">
      <app-wh-base [detail]="listing" />
      <div class="pane-divider" (mousedown)="onDividerMousedown($event, 'top')"></div>
      <app-item-annotation [detail]="listing" />
      <div class="pane-divider" (mousedown)="onDividerMousedown($event, 'middle')"></div>
      <app-item-research [detail]="listing" />
    </div>
  </div>
} @else {
  <div class="detail-empty">
    <mat-icon>info</mat-icon>
    <p>Kein Inserat ausgewählt.</p>
  </div>
}
