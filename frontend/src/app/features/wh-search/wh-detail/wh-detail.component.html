@for (lst of currentListingArr(); track lst.id) {
  <div class="detail-panel" [@detailSlide]>
    <div class="detail-header">
      <h2 class="detail-title">{{ lst.title }}</h2>
    </div>

    <div class="detail-content">
      <app-wh-base [listing]="lst" />
      <mat-divider />
      <app-item-annotation [listing]="lst" [detail]="detail()" />
      <mat-divider />
      <app-item-research />
    </div>
  </div>
} @empty {
  <div class="detail-empty">
    <mat-icon>info</mat-icon>
    <p>Kein Inserat ausgewählt.</p>
  </div>
}
