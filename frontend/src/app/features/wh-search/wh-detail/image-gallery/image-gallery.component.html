<div class="gallery">
  <!-- Main image -->
  <div class="main-frame" (wheel)="onWheel($event)" style="touch-action: none">
    @if (activeImage(); as img) {
      <img
        class="main-img"
        [src]="img.fullUrl"
        [alt]="'Bild ' + (activeIndex() + 1)"
        (click)="openLightbox()" />
    }

    <!-- Nav arrows -->
    @if (total() > 1) {
      <button
        mat-icon-button
        class="nav-btn nav-prev"
        (click)="prev()"
        aria-label="Vorheriges Bild">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <button mat-icon-button class="nav-btn nav-next" (click)="next()" aria-label="Nächstes Bild">
        <mat-icon>chevron_right</mat-icon>
      </button>
    }

    <!-- Counter -->
    <span class="counter">{{ activeIndex() + 1 }}&thinsp;/&thinsp;{{ total() }}</span>

    <!-- Expand button -->
    <button mat-icon-button class="expand-btn" (click)="openLightbox()" aria-label="Vollbild">
      <mat-icon>open_in_full</mat-icon>
    </button>
  </div>

  <!-- Thumbnail strip -->
  @if (total() > 1) {
    <div class="thumb-strip" (wheel)="onWheel($event)" style="touch-action: none">
      @for (img of images(); track $index) {
        <button
          class="thumb-btn"
          [class.active]="$index === activeIndex()"
          (click)="select($index)"
          [attr.aria-label]="'Bild ' + ($index + 1)">
          <img class="thumb-img" [src]="img.thumbUrl" [alt]="'Vorschau ' + ($index + 1)" />
        </button>
      }
    </div>
  }
</div>
