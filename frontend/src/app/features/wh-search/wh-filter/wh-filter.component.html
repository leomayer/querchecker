<div class="filter-section">
  <h2 class="section-label">Willhaben Suche</h2>

  <form class="search-form" (submit)="$event.preventDefault(); onSearch()">
    <mat-form-field class="keyword-field">
      <mat-label>Suchbegriff</mat-label>
      <input
        matInput
        [value]="keyword()"
        (input)="onKeywordInput($event)"
        placeholder="z.B. RTX 4070"
        maxlength="100" />
    </mat-form-field>

    <div class="search-row">
      <mat-form-field class="price-field">
        <mat-label>Preis von (€)</mat-label>
        <input
          matInput
          type="number"
          [value]="priceFrom() ?? ''"
          (input)="onPriceFromInput($event)"
          min="0" />
      </mat-form-field>

      <mat-form-field class="price-field">
        <mat-label>Preis bis (€)</mat-label>
        <input
          matInput
          type="number"
          [value]="priceTo() ?? ''"
          (input)="onPriceToInput($event)"
          min="0" />
      </mat-form-field>
    </div>

    <div class="search-row">
      <mat-form-field class="rows-field">
        <mat-label>Ergebnisse</mat-label>
        <mat-select [value]="rows()" (valueChange)="store.setFilterDraft({ rows: $event })">
          @for (opt of rowOptions; track opt) {
            <mat-option [value]="opt">{{ opt }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <app-location-filter
      [locationAreaId]="locationAreaId()"
      (locationAreaIdChange)="store.setFilterDraft({ locationAreaId: $event })" />

    <app-category-filter
      [categoryWhId]="categoryWhId()"
      (categoryWhIdChange)="store.setFilterDraft({ categoryWhId: $event })" />

    <mat-checkbox
      [checked]="paylivery()"
      (change)="store.setFilterDraft({ paylivery: $event.checked })">
      Nur Paylivery
    </mat-checkbox>

    <div class="action-row">
      <button
        mat-flat-button
        class="search-btn"
        type="submit"
        [disabled]="!canSearch() || loading()">
        <mat-icon>search</mat-icon>
        Suchen
      </button>

      @if (searchMode() || hasDraft()) {
        <button mat-stroked-button type="button" class="reset-btn" (click)="clearSearch()">
          <mat-icon>close</mat-icon>
          Zurücksetzen
        </button>
      }
    </div>

    @if (loading()) {
      <mat-progress-bar mode="indeterminate" class="search-progress" />
    }

    @if (error()) {
      <p class="error-message">{{ error() }}</p>
    }
  </form>
</div>
