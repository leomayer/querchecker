<div class="filter-section">
  <h2 class="section-label">Willhaben Suche</h2>

  <form class="search-form" (ngSubmit)="onSearch()">
    <mat-form-field appearance="outline" class="keyword-field">
      <mat-label>Suchbegriff</mat-label>
      <input
        matInput
        [value]="keyword()"
        (input)="onKeywordInput($event)"
        placeholder="z.B. RTX 4070"
      />
    </mat-form-field>

    <div class="search-row">
      <mat-form-field appearance="outline" class="price-field">
        <mat-label>Preis von (€)</mat-label>
        <input matInput type="number" [value]="priceFrom() ?? ''" (input)="onPriceFromInput($event)" min="0" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="price-field">
        <mat-label>Preis bis (€)</mat-label>
        <input matInput type="number" [value]="priceTo() ?? ''" (input)="onPriceToInput($event)" min="0" />
      </mat-form-field>
    </div>

    <div class="search-row">
      <mat-form-field appearance="outline" class="rows-field">
        <mat-label>Ergebnisse</mat-label>
        <mat-select [value]="rows()" (valueChange)="rows.set($event)">
          @for (opt of rowOptions; track opt) {
            <mat-option [value]="opt">{{ opt }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="section-divider"></div>

    <app-location-filter
      [locationAreaId]="locationAreaId()"
      (locationAreaIdChange)="locationAreaId.set($event)"
    />

    <app-category-filter
      [categoryWhId]="categoryWhId()"
      (categoryWhIdChange)="categoryWhId.set($event)"
    />

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="!keyword().trim() || loading()"
      class="search-btn"
    >
      <mat-icon>search</mat-icon>
      Suchen
    </button>
  </form>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (error()) {
    <p class="error-message">{{ error() }}</p>
  }
</div>
