<div class="filter-bar">
  <mat-form-field appearance="outline" class="filter-field" subscriptSizing="dynamic">
    <mat-label>Filtern</mat-label>
    <input
      matInput
      [ngModel]="filterText()"
      (ngModelChange)="filterText.set($event)"
      name="filterText"
      placeholder="Titel oder Standort..."
    />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <mat-slide-toggle
    [checked]="freeOnly()"
    (change)="freeOnly.set($event.checked)"
    color="primary"
  >
    Zu verschenken
  </mat-slide-toggle>
</div>
