<mat-card>
  <mat-card-header>
    <mat-card-title>Willhaben durchsuchen</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form class="search-form" (ngSubmit)="onSearch()">
      <div class="search-row">
        <mat-form-field appearance="outline" class="keyword-field">
          <mat-label>Suchbegriff</mat-label>
          <input
            matInput
            [(ngModel)]="keyword"
            name="keyword"
            placeholder="z.B. RTX 4070"
            required
          />
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="rows-field">
          <mat-label>Ergebnisse</mat-label>
          <mat-select [(ngModel)]="rows" name="rows">
            @for (opt of rowOptions; track opt) {
              <mat-option [value]="opt">{{ opt }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <div class="search-row">
        <mat-form-field appearance="outline" class="price-field">
          <mat-label>Preis von (€)</mat-label>
          <input matInput type="number" [(ngModel)]="priceFrom" name="priceFrom" min="0" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="price-field">
          <mat-label>Preis bis (€)</mat-label>
          <input matInput type="number" [(ngModel)]="priceTo" name="priceTo" min="0" />
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="!keyword.trim() || loading()"
        >
          <mat-icon>search</mat-icon>
          Suchen
        </button>
      </div>
    </form>

    @if (loading()) {
      <mat-progress-bar mode="indeterminate" />
    }

    @if (error()) {
      <p class="error-message">{{ error() }}</p>
    }
  </mat-card-content>
</mat-card>
