server:
  port: 14070

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  datasource:
    url: jdbc:postgresql://localhost:14071/mydb
    username: myuser
    password: mypassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

querchecker:
  wh:
    refresh:
      cron: "0 0 3 * * MON"   # montags um 03:00; Spring-Cron: Sek Min Std Tag Mon Wochentag
  dl:
    min-confidence: 0.0       # Evaluierungsphase: alle Ergebnisse speichern
    top-k: 5                  # Filter VOR DB-Insert
    gpu-layers: 0             # 0 = CPU-only; set to 999 in GPU environments (llama.cpp clamps to model layer count)
    item-text-cleanup:
      retention-days: 10      # ältere ItemText-Records löschen (nicht neuester + kein userCorrectedTerm)
      cron: "0 0 3 * * *"     # täglich um 3 Uhr nachts

logging:
  level:
    at.querchecker.deepLearning: DEBUG
    at.querchecker.willHaben: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
