server:
  port: 14070

spring:
  datasource:
    url: jdbc:postgresql://localhost:14071/mydb
    username: myuser
    password: mypassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

querchecker:
  wh:
    refresh:
      cron: "0 0 3 * * MON"   # montags um 03:00; Spring-Cron: Sek Min Std Tag Mon Wochentag

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
