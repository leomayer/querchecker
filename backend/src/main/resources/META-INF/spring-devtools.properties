# Load the llama.cpp JNI jar from the base classloader so the native
# library (libjllama.so) is only loaded once per JVM process.
# Without this, DevTools hot-restarts create a new RestartClassLoader that
# tries to re-load the native lib — which the JVM forbids — causing
# UnsatisfiedLinkError on every restart after the first.
# Pattern is matched against the jar file URL on the classpath.
restart.exclude.llama=llama-.*\.jar
